<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Compounders · long-horizon trend</title>
<style>
:root{
  --bg:#f5f5f0; --panel:#ffffff; --card:#fbfbf8; --hair:#e4e4dc; --hair2:#d2d2c8;
  --ink:#1b1e22; --mute:#6c727a; --dim:#9aa0a7;
  --green:#0a8f4f; --greenbg:#0a8f4f; --pos:#0a8f4f; --neg:#b23b2e;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
header{padding:22px 26px 12px;border-bottom:1px solid var(--hair);background:var(--panel);display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.title{font-size:19px;font-weight:700;letter-spacing:.14em}
.title .dot{color:var(--green)}
.sub{color:var(--mute);font-size:12px;margin-top:5px;letter-spacing:.02em;max-width:760px;line-height:1.5}
.sub b{color:var(--ink);font-weight:600}
.hdlink{color:var(--green);font-size:11px;font-weight:600;letter-spacing:.04em;border:1px solid var(--hair2);padding:5px 11px;border-radius:6px;white-space:nowrap}
.hdlink:hover{border-color:var(--green)}
.tabs{display:flex;gap:8px;padding:14px 26px 0;align-items:center;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--hair2);color:var(--mute);font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.02em;padding:8px 16px;border-radius:7px;cursor:pointer}
.tab:hover{color:var(--ink);border-color:var(--mute)}
.tab.on{color:#fff;background:var(--green);border-color:var(--green)}
.tabdesc{padding:10px 26px 0;color:var(--mute);font-size:11.5px;max-width:1100px;line-height:1.55;min-height:16px}
.tabdesc b{color:var(--ink)}
.controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;padding:14px 26px;border-bottom:1px solid var(--hair)}
.controls label{font-size:10.5px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;display:flex;flex-direction:column;gap:5px}
input[type=text],select,input[type=number]{background:var(--panel);border:1px solid var(--hair2);color:var(--ink);font-family:var(--sans);font-size:13px;padding:7px 9px;border-radius:5px;outline:none}
input[type=text]{min-width:180px}
input:focus,select:focus{border-color:var(--green)}
.chk{flex-direction:row!important;align-items:center;gap:7px;cursor:pointer;padding-top:14px}
.chk input{accent-color:var(--green);width:15px;height:15px}
.seg{display:flex;border:1px solid var(--hair2);border-radius:6px;overflow:hidden;width:fit-content}
.segb{background:var(--panel);border:none;border-right:1px solid var(--hair2);color:var(--mute);font-family:var(--sans);font-size:12px;font-weight:600;padding:7px 13px;cursor:pointer}
.segb:last-child{border-right:none}
.segb:hover{color:var(--ink)}
.segb.on{background:var(--green);color:#fff}
.wrap{overflow:auto;max-height:calc(100vh - 210px)}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel);color:var(--mute);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:10px;
  padding:11px 10px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--hair2);z-index:5}
thead th.l{text-align:left}
thead th:hover{color:var(--ink)}
th .ar{color:var(--green);font-size:9px;margin-left:3px}
tbody td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--hair);white-space:nowrap;font-variant-numeric:tabular-nums;font-family:var(--mono)}
tbody td.l{text-align:left;font-family:var(--sans)}
tbody tr:hover{background:#eef0ea}
.tk{font-family:var(--mono);font-weight:700}
.tk:hover{color:var(--green)}
.nm{color:var(--mute);font-size:11.5px;overflow:hidden;text-overflow:ellipsis}
.rk{color:var(--dim)}
.pos{color:var(--pos)} .neg{color:var(--neg)} .muted{color:var(--dim)}
.sumcol{font-weight:700;color:var(--ink)}
.kbar{display:inline-block;height:3px;background:var(--green);vertical-align:middle;margin-left:6px;border-radius:2px;opacity:.5}
.ctry{font-family:var(--mono);font-size:11px;color:var(--mute)}
/* Frozen identity columns (1-3: #, Ticker, Name) so metric columns scroll under them */
.wrap thead th:nth-child(-n+3),.wrap tbody td:nth-child(-n+3){position:sticky}
.wrap tbody td:nth-child(-n+3){z-index:3;background:var(--panel)}
.wrap tbody tr:hover td:nth-child(-n+3){background:#eef0ea}
.wrap thead th:nth-child(-n+3){z-index:6}
.wrap :is(th,td):nth-child(1){left:0;width:40px;min-width:40px;max-width:40px}
.wrap :is(th,td):nth-child(2){left:40px;width:66px;min-width:66px;max-width:66px}
.wrap :is(th,td):nth-child(3){left:106px;width:170px;min-width:170px;max-width:170px;box-shadow:inset -1px 0 0 var(--hair2)}
footer{padding:16px 26px 40px;color:var(--dim);font-size:11px;line-height:1.7;border-top:1px solid var(--hair);max-width:1100px}
footer b{color:var(--mute)}
.count{color:var(--green);font-family:var(--mono)}
@media(max-width:720px){.wrap :is(th,td):nth-child(-n+3){position:static}}
</style>
</head>
<body>
<header>
  <div>
    <div class="title">COMPOUNDERS<span class="dot">.</span></div>
    <div class="sub">The longest, steadiest compounders. Same universe as the board, viewed over multi-year windows. <span id="meta"></span></div>
  </div>
  <a class="hdlink" href="index.html">&nwarr; Momentum Board</a>
</header>

<div class="tabs" id="tabs"></div>
<div class="tabdesc" id="tabdesc"></div>

<div class="controls">
  <label>Search<input type="text" id="q" placeholder="ticker or name"/></label>
  <label>Country<select id="fCtry"></select></label>
  <label>Sector<select id="fSec"></select></label>
  <label>Min history (yrs)<input type="number" id="fHy" value="" placeholder="any" style="width:96px"/></label>
  <label>Min mkt-cap $m<input type="number" id="fMc" value="" placeholder="any" step="100" style="width:96px"/></label>
  <label>Max mkt-cap $m<input type="number" id="fMcMax" value="" placeholder="any" step="100" style="width:96px"/></label>
  <label class="chk"><input type="checkbox" id="fLiq" checked/> Liquid &gt;$5m/day</label>
  <label class="chk"><input type="checkbox" id="fDip"/> Quality dip only</label>
  <label id="wlab">Growth tilt
    <span class="seg" id="wbtns">
      <button type="button" class="segb" data-w="0.2">Steady</button>
      <button type="button" class="segb" data-w="0.5">Balanced</button>
      <button type="button" class="segb" data-w="0.8">Growth</button>
    </span>
  </label>
  <label id="cslab">Consistency over
    <select id="consSpan"><option value="20">last 20y</option><option value="30">last 30y</option><option value="all">full history</option></select>
  </label>
</div>

<div class="wrap">
<table>
<thead><tr id="hr"></tr></thead>
<tbody id="tb"></tbody>
</table>
</div>

<footer id="legend"></footer>

<script>
const WINS=[10,15,20,25,30,50];
const GCAP=30, KCAP=25;   // absolute yardsticks for the Compounder score: 30%/yr growth, 25 avg-K
const TABS=[
 {id:'k',   label:'Raw K',            desc:'<b>Raw K-ratio</b> per window (slope &divide; standard error of log-price vs time): steadiness of the climb. Bigger = steadier. CAVEAT: K is a t-statistic, so it grows with window length. A 50y K is mechanically larger than a 10y K for the same smoothness. <b>Compare DOWN a column, not across.</b>'},
 {id:'avgk',label:'Average K (K&divide;yrs)',desc:'<b>K divided by the window’s years.</b> Cancels the length effect, so columns ARE comparable across horizons: a flat row = equally steady at every horizon; a falling row = rougher in the older (longer) windows.'},
 {id:'g',   label:'Growth (G %/yr)',  desc:'<b>Annualised trend growth</b> (%/yr) from the same regression: how FAST it compounded, regardless of smoothness.'},
 {id:'score',label:'Compounder score', desc:'<b>0-100 ABSOLUTE blend of growth + steadiness.</b> Growth is scored against a fixed 30%/yr yardstick and steadiness against a fixed avg-K of 25 (not against the other names on screen), so the score is stable and does NOT change as you filter. The two are combined as a GEOMETRIC mean, so a name must score on BOTH. The <b>Growth tilt</b> buttons (Steady / Balanced / Growth) shift the emphasis between steadiness and growth. A ratio (growth&divide;steadiness) would be wrong, it rewards jaggedness; this blends.'},
 {id:'cons',label:'Consistency (across horizons)', desc:'<b>Is it steady-and-high at EVERY horizon, not just one?</b> Shows the avg-K profile (10-50y) plus <b>Mean</b> and <b>Consistency = Mean − SD</b> of avg-K (high mean AND low scatter scores high). Use <b>Consistency over</b> to pick the lookback: <b>last 20y / last 30y</b> grade every name on the SAME ladder (fair like-for-like, so a 50y name is not punished for an ancient rough patch a 20y name simply lacks the data to show); <b>full history</b> judges each name on its own whole life (uneven, not cross-comparable). KO scores below JNJ/PG: higher near-term K but it fades at 30-50y while they stay flat.'},
];
let DATA=[], metric='k', sortKey='c20', asc=false, WG=0.5, CONSSPAN='20', curCols=[];
const IDF=['rank','t','name','ctry','sec','px','mc','hy'];

const num=v=>v===null||v===undefined||v===''?null:+v;
const r1=v=>Math.round(v*10)/10, r2=v=>Math.round(v*100)/100;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=(v,d=1)=>v===null||v===undefined?'<span class="muted">&middot;</span>':(+v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});

function avgK(r,w){const k=r['k'+w];return k===null||k===undefined?null:k/w;}            // K per year
function score(r,w){                                                                     // absolute 0-100
  const g=r['g'+w], k=r['k'+w];
  if(g===null||g===undefined||k===null||k===undefined)return null;
  const ng=clamp(g/GCAP,0,1), nk=clamp((k/w)/KCAP,0,1);
  return Math.round(Math.pow(ng,WG)*Math.pow(nk,1-WG)*100);
}
function consWindows(){return CONSSPAN==='20'?[10,15,20]:CONSSPAN==='30'?[10,15,20,25,30]:WINS;}
function consStats(r){
  // Fixed spans (20/30): require ALL windows in the set, so every scored name is judged on the
  // SAME ladder (a 50y name is graded on its recent 20y just like a 20y name, no unfair extra
  // ancient-rough penalty). 'full history': use whatever it has (>=3), each judged on its own life.
  const ws=consWindows();
  let xs=ws.map(w=>avgK(r,w));
  if(CONSSPAN==='all'){xs=xs.filter(v=>v!==null); if(xs.length<3)return {mean:null,cons:null};}
  else if(xs.some(v=>v===null))return {mean:null,cons:null};
  const mean=xs.reduce((a,b)=>a+b,0)/xs.length;
  const sd=Math.sqrt(xs.reduce((a,b)=>a+(b-mean)**2,0)/xs.length);
  return {mean:r1(mean), cons:r1(mean-sd)};
}
// the metric columns for the active tab: each {key,label,val(r),d}
function metricCols(){
  if(metric==='cons'){
    const prof=WINS.map(w=>({key:'c'+w,label:'K/yr '+w+'y',val:r=>{const v=avgK(r,w);return v===null?null:r2(v);},d:2}));
    return prof.concat([
      {key:'mean',label:'Mean K/yr',val:r=>consStats(r).mean,d:1,sum:1},
      {key:'cons',label:'Consistency',val:r=>consStats(r).cons,d:1,sum:1},
    ]);
  }
  const pre=metric==='g'?'G ':metric==='avgk'?'K/yr ':metric==='score'?'Score ':'K ';
  const suf=metric==='g'?' %':'';
  const d=metric==='avgk'?2:metric==='score'?0:1;
  return WINS.map(w=>({key:'c'+w,label:pre+w+'y'+suf,d,val:r=>{
    if(metric==='k')return r['k'+w];
    if(metric==='g')return r['g'+w];
    if(metric==='avgk'){const v=avgK(r,w);return v===null?null:r2(v);}
    return score(r,w);
  }}));
}
function valueFor(r,key){
  if(IDF.includes(key))return r[key];
  const c=curCols.find(c=>c.key===key);
  return c?c.val(r):null;
}

function buildTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab" data-id="${t.id}">${t.label}</button>`).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setMetric(b.dataset.id));
}
function setMetric(m){
  metric=m; asc=false;
  sortKey = m==='cons' ? 'cons' : 'c20';   // default: 20y window, or the consistency score
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.id===m));
  document.getElementById('tabdesc').innerHTML=TABS.find(t=>t.id===m).desc;
  document.getElementById('wlab').style.display = m==='score'?'':'none';   // weight buttons: score tab only
  document.getElementById('cslab').style.display = m==='cons'?'':'none';   // lookback selector: consistency tab only
  draw();
}
function draw(){           // tab/column change: rebuild header THEN body
  curCols=metricCols();
  buildHead();
  paint();
}
function buildHead(){
  const id=[['rank','#','l rk'],['t','Ticker','l'],['name','Name','l nm']]
    .map(([k,t,c])=>`<th class="${c}" data-key="${k}">${t}<span class="ar"></span></th>`).join('');
  const extra=`<th class="l" data-key="hy">Hist y<span class="ar"></span></th>`
    +`<th class="l nm" data-key="ctry">Ctry<span class="ar"></span></th>`
    +`<th class="l nm" data-key="sec">Sector<span class="ar"></span></th>`
    +`<th data-key="px">Price<span class="ar"></span></th>`
    +`<th data-key="mc">Mkt $m<span class="ar"></span></th>`;
  const mc=curCols.map(c=>`<th data-key="${c.key}">${c.label}<span class="ar"></span></th>`).join('');
  document.getElementById('hr').innerHTML=id+extra+mc;
  document.querySelectorAll('#hr th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.key; if(k==='rank')return;
    if(sortKey===k)asc=!asc; else{sortKey=k;asc=(k==='t'||k==='name'||k==='ctry'||k==='sec');}
    paint();
  });
}
function passes(r){
  const q=document.getElementById('q').value.trim().toLowerCase();
  if(q && !((r.t||'').toLowerCase().includes(q)||(r.name||'').toLowerCase().includes(q)))return false;
  const c=document.getElementById('fCtry').value; if(c && r.ctry!==c)return false;
  const sc=document.getElementById('fSec').value; if(sc && r.sec!==sc)return false;
  const hy=num(document.getElementById('fHy').value); if(hy!==null && (r.hy===null||r.hy<hy))return false;
  const mc=num(document.getElementById('fMc').value); if(mc!==null && (r.mc===null||r.mc<mc))return false;
  const mcx=num(document.getElementById('fMcMax').value); if(mcx!==null && (r.mc===null||r.mc>mcx))return false;
  if(document.getElementById('fLiq').checked && (r.adv===null||r.adv<5))return false;
  if(document.getElementById('fDip').checked &&    // quality dip: durable + uptrend intact + pulled back + turning up
     !(r.k5!=null&&r.k5>=60&&r.vs200!=null&&r.vs200>0&&r.vs150!=null&&r.vs150>0&&r.vs50!=null&&r.vs50<0&&r.m1!=null&&r.m1>0))return false;
  if(metric==='cons' && consStats(r).cons===null)return false; // only names scorable at the chosen lookback
  return true;
}
function paint(){          // filter/sort/weight change: recompute values + body, header unchanged
  let view=DATA.filter(passes);
  view.sort((a,b)=>{
    let x=valueFor(a,sortKey), y=valueFor(b,sortKey);
    if(typeof x==='string')return asc?(''+x).localeCompare(y):(''+y).localeCompare(x);
    if(x===null||x===undefined)x=-1e18; if(y===null||y===undefined)y=-1e18;
    return asc?x-y:y-x;
  });
  const cmax={}; curCols.forEach(c=>{cmax[c.key]=Math.max(1,...view.map(r=>{const v=c.val(r);return v&&v>0?v:0;}));});
  document.querySelectorAll('#hr th').forEach(th=>{const ar=th.querySelector('.ar');if(ar)ar.textContent=th.dataset.key===sortKey?(asc?'▲':'▼'):'';});
  const tb=document.getElementById('tb');
  tb.innerHTML=view.map((r,i)=>{
    const cs={USD:'$',GBp:'p',EUR:'€',CAD:'C$'}[r.ccy]||'';
    let cells=''
      +`<td class="l rk">${i+1}</td>`
      +`<td class="l"><a class="tk" target="_blank" href="https://finance.yahoo.com/quote/${encodeURIComponent(r.t)}">${r.t.replace('.L','')}</a></td>`
      +`<td class="l nm">${r.name||''}</td>`
      +`<td>${fmt(r.hy,1)}</td>`
      +`<td class="l"><span class="ctry">${r.ctry}</span></td>`
      +`<td class="l nm">${r.sec||''}</td>`
      +`<td>${fmt(r.px,2)}<span class="muted" style="font-size:9px"> ${cs}</span></td>`
      +`<td>${r.mc==null?'<span class="muted">&middot;</span>':(r.mc>=1000?(r.mc/1000).toFixed(1)+'k':fmt(r.mc,0))}</td>`;
    cells+=curCols.map(c=>{
      const v=c.val(r);
      if(v===null||v===undefined)return `<td><span class="muted">&middot;</span></td>`;
      const cls=(v<0?'neg ':'')+(c.sum?'sumcol':'');
      const bar=v>0?`<span class="kbar" style="width:${Math.round(v/cmax[c.key]*30)}px"></span>`:'';
      return `<td class="${cls}">${fmt(v,c.d)}${bar}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  document.getElementById('meta').innerHTML=`<b>${view.length.toLocaleString()}</b> names`;
}
function fillSelect(id,vals){
  const s=document.getElementById(id);
  s.innerHTML='<option value="">All</option>'+[...new Set(vals.filter(Boolean))].sort().map(v=>`<option>${v}</option>`).join('');
}
document.getElementById('legend').innerHTML=
 '<b>Reading it.</b> Five lenses on the same long-run trend, one tab each. <b>Raw K</b> = K-ratio per window (grows with window length, compare down a column not across). <b>Average K</b> = K &divide; window-years (length effect removed, comparable across horizons). <b>Growth G</b> = annualised trend growth %/yr (size of the climb). '
 +'<b>Compounder score</b> = an ABSOLUTE 0-100 blend: growth scored against a fixed 30%/yr yardstick, steadiness against a fixed avg-K of 25, combined as a geometric mean (so both must be present), tilted by Growth weight %. Absolute means a name’s score is fixed, it does NOT shift as you filter (unlike a percentile rank). '
 +'<b>Consistency</b> = Mean and Mean−SD of avg-K across the horizons a name has (&ge;3 windows): rewards being steady-and-high at EVERY horizon, not just one. '
 +'<br><br><b>Market cap + size:</b> the <b>Mkt $m</b> column shows size; use Min and Max mkt-cap together to isolate a size band (e.g. small-caps only). Note K is size-biased, bigger companies score higher K almost mechanically (smoother revenue, lower vol; corr +0.43), so a high K on a SMALL company is rarer and harder-won. Judge K within a size band, not across. <b>Quality dip only</b> = durable smooth names (K5y&ge;60) in an intact uptrend (above 150/200-day) that have pulled back below the 50-day and turned up last month: buy quality into weakness. '
 +'<br><br><b>Strict history:</b> a name only carries a value for a window if it has the FULL window (Visa, listed 2008, blank at 20y+, present at 10/15y). The long windows are heavily survivorship-biased: coverage falls from ~84% at 10y to ~8% at 50y. The in-cell bar scales to the visible column. Click any header to sort. Snapshot data, not investment advice.';

fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d.rows;
  document.querySelector('.sub').insertAdjacentHTML('beforeend',` &nbsp;&middot;&nbsp; generated <b>${d.generated}</b>`);
  fillSelect('fCtry',DATA.map(r=>r.ctry));
  fillSelect('fSec',DATA.map(r=>r.sec));
  ['q','fHy','fMc','fMcMax'].forEach(id=>document.getElementById(id).addEventListener('input',paint));
  ['fCtry','fSec','fLiq','fDip'].forEach(id=>document.getElementById(id).addEventListener('change',paint));
  // growth-tilt segmented buttons (score tab)
  document.querySelectorAll('#wbtns .segb').forEach(b=>b.onclick=()=>{
    WG=+b.dataset.w;
    document.querySelectorAll('#wbtns .segb').forEach(x=>x.classList.toggle('on',x===b));
    paint();
  });
  document.querySelector('#wbtns .segb[data-w="0.5"]').classList.add('on'); // default Balanced
  // consistency lookback selector (consistency tab)
  document.getElementById('consSpan').addEventListener('change',e=>{CONSSPAN=e.target.value;paint();});
  buildTabs();
  setMetric('k');   // -> draw() builds header + body
}).catch(e=>{document.getElementById('tb').innerHTML=`<tr><td class="l" style="padding:30px;color:var(--neg)">Failed to load data.json: ${e}</td></tr>`;});
</script>
</body>
</html>
